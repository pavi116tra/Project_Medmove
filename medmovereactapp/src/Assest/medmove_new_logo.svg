<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Ambulance Icon -->
  <g transform="translate(10, 20)">
    <!-- Main Body -->
    <path d="M 10 30 L 10 70 A 5 5 0 0 0 15 75 L 85 75 A 5 5 0 0 0 90 70 L 90 45 L 75 30 Z" fill="none" stroke="#5B9ECC" stroke-width="6" stroke-linejoin="round"/>
    <!-- Cab window -->
    <path d="M 65 35 L 75 35 L 85 45 L 65 45 Z" fill="#5B9ECC"/>
    <!-- Wheels -->
    <circle cx="30" cy="75" r="12" fill="#5B9ECC" />
    <circle cx="30" cy="75" r="4" fill="#FFF" />
    <circle cx="75" cy="75" r="12" fill="#5B9ECC" />
    <circle cx="75" cy="75" r="4" fill="#FFF" />
    <!-- Red Cross -->
    <path d="M 35 40 L 45 40 L 45 30 L 55 30 L 55 40 L 65 40 L 65 50 L 55 50 L 55 60 L 45 60 L 45 50 L 35 50 Z" fill="#E64E59"/>
    <!-- Top Light -->
    <path d="M 65 25 L 75 25 L 75 30 L 65 30 Z" fill="#E64E59"/>
  </g>
  <!-- Text -->
  <text x="120" y="75" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="56" fill="#E64E59">Med<tspan fill="#5B9ECC">Move</tspan></text>
  <text x="122" y="98" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#5B9ECC" letter-spacing="0.5">SAFE NON-EMERGENCY MEDICAL TRANSPORT</text>
</svg>
